<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  form {
    background-color: white;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    text-align: left;
  }

  label {
    font-weight: bold;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  input[type="radio"],
  input[type="checkbox"] {
    width: auto;
    margin-right: 5px;
  }

  button {
    width: 100%;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background-color: #0056b3
  }
</style>
  </head>

  <body>
     <h1 id="title">Junior developer appliaction form</h1>
     <p id="description">Please fill out this form to apply for a junior developer position.</p>
  
    <form id="survey-form">

      
      <label id="name-label" for="name">Name:</label>
      <input 
        type="text" 
        id="name" 
        name="name" 
        placeholder="Enter your full name" 
        required
      >

  <br>    
     <label id="email-label"for="email">Email</label>
<input type="email" id="email" name ="email" placeholder="Enter your email" required>

<br>
 <label id="number-label" for="number">Age:</label>
      <input 
        type="number" 
        id="number" 
        name="number" 
        placeholder="Enter your age" 
        min="18" 
        max="30"
        required
      >

  <br>

      <p>Experience Level:</p>
      <input type="radio" id="beginner" name="experience" value="beginner" required>
      <label for="beginner">Beginner</label><br>
      <input type="radio" id="intermediate" name="experience" value="intermediate">
      <label for="intermediate">Intermediate</label><br>
      <input type="radio" id="advanced" name="experience" value="advanced">
      <label for="advanced">Advanced</label>
      
    <br>

    <label for="dropdown">Preferred Programming Language:</label>
      <select id="dropdown" name="dropdown" required>
        <option value="">Select an option</option>
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
      </select>
      <br><br>

      
      <p>Skills:</p>
      <input type="checkbox" id="html" name="skills" value="html">
      <label for="html">HTML</label><br>
      <input type="checkbox" id="css" name="skills" value="css">
      <label for="css">CSS</label><br>
      <input type="checkbox" id="js" name="skills" value="javascript">
      <label for="js">JavaScript</label>
      <br>
      <label for="comments">Additional Comments:</label><br>
      <textarea id="comments" name="comments" placeholder="Enter your comments here"></textarea>

      <br><br>

     
      <button type="submit" id="submit">Submit</button>
   

</form>
  </body>
</html>
